version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: finpath_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: finpath
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres/schema_creation.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: finpath_backend
    environment:
      DB_USER: postgres
      DB_HOST: postgres
      DB_NAME: finpath
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    container_name: finpath_dashboard
    environment:
      DB_USER: postgres
      DB_HOST: postgres
      DB_NAME: finpath
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./dashboard/data:/app/data
    ports:
      - "8501:8501"

networks:
  default:
    name: finpath_network

volumes:
  postgres_data: